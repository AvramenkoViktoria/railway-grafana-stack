global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'crypto-monitor'
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ['https://crypto-monitor-production-5d1b.up.railway.app']
